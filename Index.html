<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrgemeinschaft</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBHzW0I_vNztelzqxIZnIFTZ-SeMoAnw6Y",
    authDomain:        "fahrgemeinschaft-6eb6b.firebaseapp.com",
    databaseURL:       "https://fahrgemeinschaft-6eb6b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "fahrgemeinschaft-6eb6b",
    storageBucket:     "fahrgemeinschaft-6eb6b.firebasestorage.app",
    messagingSenderId: "201707308921",
    appId:             "1:201707308921:web:398615dcf5c0f021f1d1a8"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._db        = db;
  window._dbRef     = ref;
  window._dbSet     = set;
  window._dbRemove  = remove;
  window._dbOnValue = onValue;
  document.addEventListener('DOMContentLoaded', () => { initApp(); });
</script>

<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
  --accent:#4f8aff; --accent2:#7c5cbf; --green:#34d399; --amber:#fbbf24;
  --red:#f87171; --text:#e8eaf6; --muted:#7b82a6; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 64px;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(79,138,255,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-150px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(124,92,191,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
.container{width:100%;max-width:720px;position:relative;z-index:1;}

/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--muted);padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:30px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.4s;}
.sync-dot.online{background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.offline{background:var(--red);}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.config-btn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:30px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.config-btn:hover{border-color:var(--accent);color:var(--accent);}
.config-btn svg{width:14px;height:14px;flex-shrink:0;}

header{text-align:center;margin-bottom:28px;}
.title{font-family:'DM Serif Display',serif;font-size:2.4rem;letter-spacing:-0.5px;background:linear-gradient(135deg,#e8eaf6 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{color:var(--muted);font-size:0.9rem;margin-top:6px;font-weight:300;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.25s;}
.stat-card:hover{border-color:var(--accent2);}
.stat-card.suggested{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(79,138,255,0.12);}
.stat-person{display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}
.person-name{font-weight:600;font-size:0.9rem;}
.suggested-tag{font-size:0.6rem;background:rgba(79,138,255,0.15);color:var(--accent);border:1px solid rgba(79,138,255,0.3);border-radius:20px;padding:2px 7px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.stat-numbers{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:1.3rem;line-height:1;}
.stat-key{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.bar-wrap{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}

/* WEEK */
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.week-label{font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:500;}
.week-nav{display:flex;gap:8px;}
.btn-nav{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s,border-color 0.2s;}
.btn-nav:hover{background:var(--border);border-color:var(--accent);}
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.day-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.day-name{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;}
.day-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 5px;width:100%;min-height:96px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:border-color 0.2s;position:relative;}
.day-box.today{border-color:var(--accent);}
.day-box.today::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:36px;height:2px;background:var(--accent);border-radius:2px;}
.day-date{font-size:0.65rem;color:var(--muted);}
.driver-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
.rider-dots{display:flex;flex-direction:column;gap:3px;width:100%;align-items:center;}
.rider-dot{width:20px;height:5px;border-radius:3px;opacity:0.6;}
.add-ride-btn{background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:3px 6px;font-size:0.65rem;cursor:pointer;width:100%;transition:border-color 0.2s,color 0.2s;font-family:'DM Sans',sans-serif;}
.add-ride-btn:hover{border-color:var(--accent);color:var(--accent);}
.past-day{opacity:0.45;pointer-events:none;}
.past-lock{font-size:0.7rem;color:var(--muted);margin-top:auto;padding-bottom:2px;}
.empty-day{color:var(--muted);font-size:0.6rem;text-align:center;opacity:0.4;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:400px;animation:slideUp 0.25s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.modal h3{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:4px;}
.modal-date-label{font-size:0.8rem;color:var(--muted);margin-bottom:18px;}
.person-select-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.person-option{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;transition:border-color 0.2s,background 0.2s;}
.person-option:hover{border-color:var(--accent2);background:#252840;}
.person-option.selected{border-color:var(--accent);background:rgba(79,138,255,0.08);}
.person-option .pname{font-weight:500;font-size:0.95rem;}
.person-option .prole{font-size:0.72rem;color:var(--muted);}
.person-option .suggested-label{margin-left:auto;font-size:0.7rem;color:var(--accent);font-weight:600;}
.riders-section{margin-bottom:18px;}
.riders-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.rider-checkbox-list{display:flex;flex-direction:column;gap:7px;}
.rider-checkbox{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);transition:background 0.2s;}
.rider-checkbox:hover{background:#252840;}
.rider-checkbox input{accent-color:var(--accent);width:16px;height:16px;}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{flex:1;min-width:80px;padding:11px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
.btn-primary:hover{opacity:0.9;}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);color:var(--text);}
.btn-danger{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.3);}

/* KONFIGURATION */
.config-modal{max-width:460px;}
.config-section{margin-bottom:22px;}
.config-section-title{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;font-weight:600;}
.count-selector{display:flex;gap:8px;}
.count-btn{width:48px;height:48px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Serif Display',serif;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.count-btn:hover{border-color:var(--accent2);color:var(--text);}
.count-btn.active{border-color:var(--accent);background:rgba(79,138,255,0.14);color:var(--accent);}
.person-edit-list{display:flex;flex-direction:column;gap:10px;}
.person-edit-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;transition:border-color 0.2s,opacity 0.3s;}
.person-edit-row.inactive{opacity:0.3;pointer-events:none;}
.person-edit-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
.person-color-bar{width:3px;height:28px;border-radius:2px;flex-shrink:0;}
.person-edit-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;padding:4px 2px;outline:none;transition:border-color 0.2s;}
.person-edit-input:focus{border-color:var(--accent);}
.divider{height:1px;background:var(--border);margin:0 0 20px;}

.reset-section{text-align:center;margin-top:8px;}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 20px;font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="sync-bar">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Verbinde…</span>
    </div>
    <button class="config-btn" onclick="openConfig()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Konfiguration
    </button>
  </div>

  <header>
    <div class="title">🚗 Fahrgemeinschaft</div>
    <div class="subtitle" id="mainSubtitle">Echtzeit-Sync</div>
  </header>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="week-card">
    <div class="week-header">
      <div class="week-label" id="weekLabel">KW –</div>
      <div class="week-nav">
        <button class="btn-nav" onclick="changeWeek(-1)">&#8249;</button>
        <button class="btn-nav" onclick="changeWeek(0)">&#9679;</button>
        <button class="btn-nav" onclick="changeWeek(1)">&#8250;</button>
      </div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>


</div>

<!-- FAHRT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Fahrt eintragen</h3>
    <div class="modal-date-label" id="modalDateLabel"></div>
    <div class="person-select-list" id="driverList"></div>
    <div class="riders-section">
      <div class="riders-label">Mitfahrer</div>
      <div class="rider-checkbox-list" id="riderList"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteRide()" style="display:none">Löschen</button>
      <button class="btn btn-primary" onclick="saveRide()">Speichern</button>
    </div>
  </div>
</div>

<!-- KONFIGURATION MODAL -->
<div class="modal-overlay" id="configModal">
  <div class="modal config-modal">
    <h3>⚙️ Konfiguration</h3>
    <div class="modal-date-label">Personen &amp; Einstellungen anpassen</div>

    <div class="config-section">
      <div class="config-section-title">Anzahl der Personen (1 – 5)</div>
      <div class="count-selector" id="countSelector"></div>
    </div>

    <div class="divider"></div>

    <div class="config-section">
      <div class="config-section-title">Namen der Personen</div>
      <div class="person-edit-list" id="personEditList"></div>
    </div>

    <div class="divider"></div>

    <div class="config-section">
      <div class="config-section-title">Gefahrene Daten</div>
      <button class="btn btn-danger" style="width:100%;padding:13px;" onclick="confirmReset()">
        🗑️ Alle Fahrten zurücksetzen
      </button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfig()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveConfig()">💾 Speichern</button>
    </div>
  </div>
</div>

<script>
// ── KONSTANTEN ────────────────────────────────────────────────────────────
const PALETTE = [
  { color:'#4f8aff', bg:'rgba(79,138,255,0.18)'  },
  { color:'#34d399', bg:'rgba(52,211,153,0.18)'  },
  { color:'#fbbf24', bg:'rgba(251,191,36,0.18)'  },
  { color:'#f87171', bg:'rgba(248,113,113,0.18)' },
  { color:'#c084fc', bg:'rgba(192,132,252,0.18)' },
];
const IDS = ['A','B','C','D','E'];

// ── ZUSTAND ───────────────────────────────────────────────────────────────
let config = { count:3, names:['Andreas','Person 2','Person 3','Person 4','Person 5'] };
let PERSONS = [];
let data = {}, currentWeekOffset = 0, modalDay = null, selectedDriver = null;
let configDraft = null;

// ── FIREBASE ──────────────────────────────────────────────────────────────
function setSyncStatus(state) {
  const dot=document.getElementById('syncDot'), txt=document.getElementById('syncText');
  dot.className='sync-dot '+state;
  if(state==='online')  txt.textContent='Echtzeit-Sync aktiv';
  if(state==='offline') txt.textContent='Offline';
  if(state==='syncing') txt.textContent='Speichern…';
}
function isConnected(){ return typeof window._db !== 'undefined'; }

function initApp(){
  if(!isConnected()){
    setSyncStatus('offline');
    try{ const s=localStorage.getItem('fg_config'); if(s) config=JSON.parse(s); }catch{}
    buildPersons(); renderAll(); return;
  }
  // Config-Listener
  window._dbOnValue(window._dbRef(window._db,'config'),(snap)=>{
    const r=snap.val(); if(r) config=r;
    buildPersons(); renderAll();
  });
  // Fahrtdaten-Listener
  window._dbOnValue(window._dbRef(window._db,'fahrten'),(snap)=>{
    data=snap.val()||{}; setSyncStatus('online'); renderStats(); renderWeek();
  },()=>{ setSyncStatus('offline'); });
}

async function dbSave(path,value){
  setSyncStatus('syncing');
  await window._dbSet(window._dbRef(window._db,path),value);
}
async function dbDelete(path){
  setSyncStatus('syncing');
  await window._dbRemove(window._dbRef(window._db,path));
}

// ── PERSONEN ──────────────────────────────────────────────────────────────
function buildPersons(){
  PERSONS=[];
  for(let i=0;i<config.count;i++){
    PERSONS.push({
      id:IDS[i],
      name:config.names[i]||`Person ${i+1}`,
      color:PALETTE[i].color,
      bg:PALETTE[i].bg
    });
  }
  document.getElementById('mainSubtitle').textContent=
    `${config.count} Person${config.count>1?'en':''} · max. 3 Fahrtage/Woche · Echtzeit-Sync`;
}
function renderAll(){ renderStats(); renderWeek(); }

// ── STATISTIKEN ───────────────────────────────────────────────────────────
function getStats(){
  const s={};
  PERSONS.forEach(p=>{s[p.id]={driven:0,ridden:0};});
  const todayKey=dateKey(new Date());
  Object.entries(data).forEach(([key,ride])=>{
    if(key>todayKey) return; // Zukünftige Tage ignorieren
    if(ride&&ride.driver&&s[ride.driver]!==undefined){
      s[ride.driver].driven++;
      (ride.riders||[]).forEach(r=>{ if(s[r]) s[r].ridden++; });
    }
  });
  return s;
}
function getSuggested(){
  const s=getStats(); let min=Infinity,sug=null;
  PERSONS.forEach(p=>{ if(s[p.id].driven<min){min=s[p.id].driven;sug=p.id;} });
  return sug;
}
function renderStats(){
  const s=getStats(),sug=getSuggested();
  const maxD=Math.max(...PERSONS.map(p=>s[p.id].driven),1);
  document.getElementById('statsGrid').innerHTML=PERSONS.map(p=>`
    <div class="stat-card ${p.id===sug?'suggested':''}">
      <div class="stat-person">
        <div class="avatar" style="background:${p.bg};color:${p.color}">${p.id}</div>
        <div>
          <div class="person-name">${p.name}</div>
          ${p.id===sug?'<div class="suggested-tag">Vorschlag</div>':''}
        </div>
      </div>
      <div class="stat-numbers">
        <div><div class="stat-value" style="color:${p.color}">${s[p.id].driven}</div><div class="stat-key">Gefahren</div></div>
        <div><div class="stat-value">${s[p.id].ridden}</div><div class="stat-key">Mitfahr.</div></div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(s[p.id].driven/maxD)*100}%;background:${p.color}"></div></div>
    </div>`).join('');
}

// ── WOCHE ─────────────────────────────────────────────────────────────────
function getWeekDays(offset=0){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+offset*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dateKey(d){return d.toISOString().slice(0,10);}
function getKW(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-ys)/86400000)+1)/7);
}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}

function renderWeek(){
  const days=getWeekDays(currentWeekOffset),kw=getKW(days[0]);
  document.getElementById('weekLabel').textContent=`KW ${kw} · ${days[0].getFullYear()}`;
  const DN=['Mo','Di','Mi','Do','Fr'];
  const todayKey=dateKey(new Date());
  document.getElementById('daysGrid').innerHTML=days.map((d,i)=>{
    const key=dateKey(d),ride=data[key],tc=isToday(d)?'today':'';
    const isPast=key<todayKey;
    let inner='';
    if(ride&&ride.driver){
      const dp=PERSONS.find(p=>p.id===ride.driver);
      if(dp){
        inner+=`<div class="driver-badge" style="background:${dp.bg};color:${dp.color};border:2px solid ${dp.color}">${dp.id}</div>`;
        if(ride.riders&&ride.riders.length){
          inner+='<div class="rider-dots">';
          ride.riders.forEach(r=>{const rp=PERSONS.find(p=>p.id===r);if(rp)inner+=`<div class="rider-dot" style="background:${rp.color}"></div>`;});
          inner+='</div>';
        }
        if(isPast){inner+=`<div class="past-lock">🔒</div>`;}
        else{inner+=`<button class="add-ride-btn" onclick="openModal('${key}',event)">✏️</button>`;}
      }
    } else {
      if(isPast){inner=`<div class="empty-day">–</div><div class="past-lock">🔒</div>`;}
      else{inner=`<div class="empty-day">–</div><button class="add-ride-btn" onclick="openModal('${key}',event)">+ Fahrt</button>`;}
    }
    return `<div class="day-col"><div class="day-name">${DN[i]}</div><div class="day-box ${tc} ${isPast?'past-day':''}"><div class="day-date">${d.getDate()}.${d.getMonth()+1}</div>${inner}</div></div>`;
  }).join('');
}
function changeWeek(dir){currentWeekOffset=dir===0?0:currentWeekOffset+dir;renderWeek();}

// ── FAHRT MODAL ───────────────────────────────────────────────────────────
function openModal(dayKey,e){
  if(e)e.stopPropagation();
  if(dayKey<dateKey(new Date())) return; // Vergangene Tage gesperrt
  modalDay=dayKey;selectedDriver=null;
  const d=new Date(dayKey),existing=data[dayKey],sug=getSuggested();
  const DF=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  document.getElementById('modalTitle').textContent=existing?'Fahrt bearbeiten':'Fahrt eintragen';
  document.getElementById('modalDateLabel').textContent=
    `${DF[d.getDay()===0?6:d.getDay()-1]}, ${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  document.getElementById('driverList').innerHTML=PERSONS.map(p=>{
    const sel=existing?p.id===existing.driver:false;
    if(sel)selectedDriver=p.id;
    return `<div class="person-option ${sel?'selected':''}" onclick="selectDriver('${p.id}')" data-id="${p.id}">
      <div class="avatar" style="background:${p.bg};color:${p.color};width:30px;height:30px;font-size:0.75rem">${p.id}</div>
      <div><div class="pname">${p.name}</div><div class="prole">Fahrer</div></div>
      ${p.id===sug?'<span class="suggested-label">&#11088; Vorschlag</span>':''}
    </div>`;
  }).join('');
  document.getElementById('riderList').innerHTML=PERSONS.map(p=>{
    const chk=existing&&existing.riders&&existing.riders.includes(p.id);
    return `<label class="rider-checkbox"><input type="checkbox" value="${p.id}" ${chk?'checked':''} id="rider_${p.id}">
      <div class="avatar" style="background:${p.bg};color:${p.color};width:24px;height:24px;font-size:0.7rem">${p.id}</div>
      <span>${p.name}</span></label>`;
  }).join('');
  document.getElementById('deleteBtn').style.display=existing?'block':'none';
  document.getElementById('modal').classList.add('open');
}
function selectDriver(id){
  selectedDriver=id;
  document.querySelectorAll('#driverList .person-option').forEach(el=>el.classList.toggle('selected',el.dataset.id===id));
  const cb=document.getElementById('rider_'+id);if(cb)cb.checked=false;
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalDay=null;selectedDriver=null;}

async function saveRide(){
  if(!selectedDriver){alert('Bitte einen Fahrer auswaehlen.');return;}
  const riders=[];
  PERSONS.forEach(p=>{const cb=document.getElementById('rider_'+p.id);if(cb&&cb.checked&&p.id!==selectedDriver)riders.push(p.id);});
  if(isConnected()) await dbSave(`fahrten/${modalDay}`,{driver:selectedDriver,riders});
  else{data[modalDay]={driver:selectedDriver,riders};renderStats();renderWeek();}
  closeModal();
}
async function deleteRide(){
  if(!modalDay)return;
  if(isConnected()) await dbDelete(`fahrten/${modalDay}`);
  else{delete data[modalDay];renderStats();renderWeek();}
  closeModal();
}
async function confirmReset(){
  const confirmed = confirm(
    '⚠️ Achtung!\n\nWirklich ALLE Fahrten unwiderruflich löschen?\n\nDieser Vorgang kann nicht rückgängig gemacht werden.'
  );
  if(!confirmed) return;
  if(isConnected()) await dbDelete('fahrten');
  else{data={};renderStats();renderWeek();}
  closeConfig();
  renderStats();
  renderWeek();
}

// ── KONFIGURATION MODAL ───────────────────────────────────────────────────
function openConfig(){
  configDraft={count:config.count, names:[...config.names]};

  // Anzahl-Buttons
  document.getElementById('countSelector').innerHTML=
    [1,2,3,4,5].map(n=>
      `<button class="count-btn ${n===configDraft.count?'active':''}" onclick="setConfigCount(${n})">${n}</button>`
    ).join('');

  renderPersonEditList();
  document.getElementById('configModal').classList.add('open');
}

function setConfigCount(n){
  configDraft.count=n;
  document.querySelectorAll('.count-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));
  renderPersonEditList();
}

function renderPersonEditList(){
  document.getElementById('personEditList').innerHTML=IDS.map((id,i)=>{
    const active=i<configDraft.count;
    const name=configDraft.names[i]||`Person ${i+1}`;
    const p=PALETTE[i];
    return `
    <div class="person-edit-row ${active?'':'inactive'}">
      <div class="person-edit-badge" style="background:${p.bg};color:${p.color}">${id}</div>
      <div class="person-color-bar" style="background:${p.color}"></div>
      <input class="person-edit-input" id="per_name_${i}" type="text"
        value="${name}" placeholder="Name eingeben"
        oninput="configDraft.names[${i}]=this.value">
    </div>`;
  }).join('');
}

function closeConfig(){
  document.getElementById('configModal').classList.remove('open');
  configDraft=null;
}

async function saveConfig(){
  // Aktuelle Eingaben übernehmen
  for(let i=0;i<5;i++){
    const inp=document.getElementById(`per_name_${i}`);
    if(inp) configDraft.names[i]=inp.value.trim()||`Person ${i+1}`;
  }
  config={...configDraft};

  if(isConnected()){
    await dbSave('config',config);
    // buildPersons + renderAll werden durch den Firebase-Listener ausgelöst
  } else {
    try{localStorage.setItem('fg_config',JSON.stringify(config));}catch{}
    buildPersons(); renderAll();
  }
  closeConfig();
}

// Klick außerhalb schließt Modal
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('configModal').addEventListener('click',function(e){if(e.target===this)closeConfig();});
</script>
